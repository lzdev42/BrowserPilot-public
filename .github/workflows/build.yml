name: Build and Release

on:
  repository_dispatch:
    types: [build_event]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: true
        default: 'main'

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: AppleSilicon
          - os: macos-15-intel
            platform: macos
            arch: Intel
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v6

      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          repository: lzdev42/BrowserPilot
          token: ${{ secrets.COMMON }}
          ref: ${{ github.event.client_payload.ref || github.event.inputs.ref || 'main' }}
          path: source

      - name: Sync build scripts
        run: |
          cp source/build_release.sh .
          chmod +x build_release.sh
          if [ -f "source/setup_camoufox.sh" ]; then
            cp source/setup_camoufox.sh .
            chmod +x setup_camoufox.sh
          fi
        shell: bash

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget
        shell: bash

      - name: Setup Java 25 (JCEF Branch)
        if: endsWith(github.event.client_payload.ref, 'jcef') || github.event.inputs.ref == 'jcef'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'jetbrains'
          java-package: 'jdk+jcef'
          cache: 'gradle'
          cache-dependency-path: source/**/*.gradle*
        env:
          GITHUB_TOKEN: ${{ secrets.COMMON }}

      - name: Setup Java 25 (Main/Non-JCEF Branch)
        if: !(endsWith(github.event.client_payload.ref, 'jcef') || github.event.inputs.ref == 'jcef')
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'jetbrains'
          cache: 'gradle'
          cache-dependency-path: source/**/*.gradle*
        env:
          GITHUB_TOKEN: ${{ secrets.COMMON }}

      - name: Setup Camoufox (Main/Non-JCEF Branch)
        if: !(endsWith(github.event.client_payload.ref, 'jcef') || github.event.inputs.ref == 'jcef')
        run: ./setup_camoufox.sh
        shell: bash
        working-directory: source
      - name: Build Release
        run: ../build_release.sh
        shell: bash
        working-directory: source

      - name: Package Windows ZIP
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path source/dist/BrowserPilot `
            -DestinationPath ./BrowserPilot-x64.zip `
            -CompressionLevel Optimal `
            -Force

      - name: Upload Build Artifact (macOS/Linux - JCEF Branch)
        if: matrix.platform != 'windows' && (endsWith(github.event.client_payload.ref, 'jcef') || github.event.inputs.ref == 'jcef')
        uses: actions/upload-artifact@v7
        with:
          name: BrowserPilot-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            source/dist/*.dmg
            source/dist/*.AppImage
          retention-days: 7

      - name: Upload Build Artifact (macOS/Linux - Main/Non-JCEF Branch)
        if: matrix.platform != 'windows' && !(endsWith(github.event.client_payload.ref, 'jcef') || github.event.inputs.ref == 'jcef')
        uses: actions/upload-artifact@v7
        with:
          name: BrowserPilot-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            source/dist/*.dmg
            source/dist/*.tar.gz
          retention-days: 7

      - name: Upload Build Artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: BrowserPilot-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./*.zip
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    # Must start with 'v' and MUST NOT contain '-dev'
    if: >-
      (startsWith(github.event.client_payload.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v')) &&
      !(contains(github.event.client_payload.ref, '-dev') || contains(github.event.inputs.ref, '-dev'))
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.ref || github.event.inputs.ref }}
          files: release-artifacts/**/*
          draft: false
          # If the version contains '-' (e.g., -alpha, -beta), mark as pre-release
          prerelease: ${{ contains(github.event.client_payload.ref || github.event.inputs.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
